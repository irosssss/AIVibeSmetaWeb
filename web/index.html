<!-- skip-link НЕ трогает location.hash (hash — это роутер): фокус переводим руками -->
<a class="skip-link" href="#main" onclick="event.preventDefault();var m=document.getElementById('main');if(m){m.setAttribute('tabindex','-1');m.focus();m.scrollIntoView();}">К содержимому</a>
<div id="root"></div>

<!-- страховка: сбой критичного скрипта до рендера — тёплая заглушка вместо пустого экрана.
     Реагируем только на script-ошибки/runtime (не на упавшую картинку) и с задержкой:
     вдруг приложение всё же смонтируется. -->
<script>
(function () {
  function showFail() {
    var root = document.getElementById("root");
    if (!root || root.childElementCount || window.__ledgerErrShown) return;
    window.__ledgerErrShown = true;
    root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;font-family:Georgia,serif;color:#2E2A26">' +
      '<div><div style="font-size:26px;margin-bottom:10px">Что-то не загрузилось…</div>' +
      '<div style="font-size:15px;opacity:.7;margin-bottom:20px;font-family:system-ui,sans-serif">Похоже, часть скриптов не доехала по сети. Обновите страницу — обычно этого достаточно.</div>' +
      '<button onclick="location.reload()" style="padding:13px 24px;border-radius:999px;border:none;background:#B7502C;color:#FBF8F2;font-size:15px;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif">Обновить страницу</button></div></div>';
  }
  window.addEventListener("error", function (e) {
    var el = e.target;
    // критичный скрипт: entry в dev (main.jsx) или бандл в проде (assets/*.js)
    var isCriticalScript = el && el.tagName === "SCRIPT" && /main\.jsx|assets\/.*\.js/.test(el.src || "");
    if (isCriticalScript || e.error) setTimeout(showFail, 1200);
  }, true);
})();
</script>

<!-- Единая точка входа: Vite собирает React, lottie, pdfmake, SheetJS и весь фронт.
     Никакого Babel-в-браузере и dev-React в проде — транспиляция на этапе сборки. -->
<script type="module" src="/main.jsx"></script>
